server:
  # 網關中心對外暴露的統一入口連接埠
  port: 9000

# ===================================================================
# 全局安全認證中心 - JWT 網關無狀態解密安全矩陣
# ===================================================================
app:
  jwt:
    # [驗證一致性防線]：此金鑰必須與原生的 Auth Service 完全對齊！
    # 網關將在最外圈利用此對稱密鑰進行微秒級的密碼學去中心化自解密，拒絕非法偽造 Token 直擊後端
    secret: "FRaNlJmM1RzRlNhYl123FRaNlJmM1RzRlNhYl123898"

# ===================================================================
# 日誌監控與分布式鏈路追蹤 (MDC + TraceId) 配置
# ===================================================================
logging:
  level:
    # 開啟網關核心路由追蹤日誌，便於排查請求轉發與 Predicate 匹配軌跡
    org.springframework.cloud.gateway: TRACE
    # 開啟 Spring MVC 核心分發器日誌，監控 DispatcherServlet 與資源處理器行為
    org.springframework.web.servlet: DEBUG
  pattern:
    # [企業級鏈路日誌 Pattern] 核心補強：透過 [%X{traceId}] 動態抽取 SLF4J MDC 核心追蹤碼
    # 確保同一次前端請求不論穿透到網關、AuthService 還是 DeptService，皆能透過唯一的 TraceId 橫向串聯
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr([TraceId: %X{traceId}]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

resilience4j:
  circuitbreaker:
    instances:
      # 部門服務專屬熔斷防線
      deptCircuitBreaker:
        slidingWindowType: COUNT_BASED       # 基於請求次數計算錯誤率
        slidingWindowSize: 10                # 滑動窗口大小為 10 次請求
        minimumNumberOfCalls: 5              # 最少收到 5 次請求才開始計算臨界值
        failureRateThreshold: 50             # 錯誤率達到 50% 即引爆熔斷（進入 OPEN 狀態）
        slowCallRateThreshold: 70            # 慢調用率達到 70% 亦觸發熔斷
        slowCallDurationThreshold: 3000ms    # 超過 3 秒視為慢調用
        waitDurationInOpenState: 10000ms     # 熔斷器開啟後，等待 10 秒後進入半開啟（HALF_OPEN）
        permittedNumberOfCallsInHalfOpenState: 3 # 在半開啟狀態下放行 3 次請求進行健康探測

      # 認證服務專屬熔斷防線
      authCircuitBreaker:
        slidingWindowSize: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 5000ms