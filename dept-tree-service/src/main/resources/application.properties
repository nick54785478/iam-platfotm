#### kafka ####
# 告訴應用程式應該連接到哪一個或哪幾個 Kafka broker 來發送和接收消息
spring.kafka.bootstrap-servers=localhost:9092


## Producer 配置
# 發生錯誤，重送次數
spring.kafka.producer.retries=5 
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1

## Consumer 配置
spring.kafka.consumer.auto-commit-interval=1000
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=group.mail
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.session.timeout.ms=15000

## Listener 配置
spring.kafka.listener.concurrency=5
#spring.kafka.listener.ack-mode=manual-immediate
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.ack-mode=record
logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka.listener.KafkaMessageListenerContainer=DEBUG

#### Redis 快取配置 ####
# Redis 伺服器位址 (本機開發通常為 localhost)
spring.data.redis.host=localhost
# Redis 伺服器 Port (預設為 6379)
spring.data.redis.port=6379
# Redis 密碼 (如果你的本機 Redis 沒有設密碼，請留空或維持註解狀態)
spring.data.redis.password=iam_redis_pass
# 使用的 Redis 資料庫索引 (預設為 0，通常提供 0-15)
spring.data.redis.database=0
# 建立連線超時時間 (防禦網路瞬斷，建議設為 3 秒)
spring.data.redis.timeout=3000ms

## Lettuce 連線池配置 (Spring Boot 預設的高效能 Redis 客戶端)
# 連線池最大連線數 (負值表示沒有限制，預設 8)
spring.data.redis.lettuce.pool.max-active=16
# 連線池最大阻塞等待時間 (若連線池滿了，最多等多久。負值表示無限等待)
spring.data.redis.lettuce.pool.max-wait=2000ms
# 連線池中的最大空閒連線 (預設 8)
spring.data.redis.lettuce.pool.max-idle=8
# 連線池中的最小空閒連線 (預設 0)
spring.data.redis.lettuce.pool.min-idle=2