<div class="list-section glass-panel animate-fade-in">
  <div class="section-header">
    <h3>Roles Definition Workspace</h3>
    <p-button label="Create Role" icon="pi pi-plus" (click)="openAddRoleModal()"
      styleClass="glow-button"></p-button>
  </div>
  <div class="table-container mt-4">
    <p-table [value]="roles()" [paginator]="true" [rows]="10" styleClass="p-datatable-sm p-datatable-striped">
      <ng-template pTemplate="header">
        <tr>
          <th>Role Code</th>
          <th>Role Name</th>
          <th>Permissions Summary</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-role>
        <tr>
          <td><code>{{ role.roleCode }}</code></td>
          <td>{{ role.roleName }}</td>
          <td>
            <span *ngFor="let p of role.permissions" class="mini-badge cyan" [title]="p.permissionName">
              {{ p.permissionCode }}
            </span>
          </td>
          <td>
            <div class="action-buttons">
              <p-button icon="pi pi-cog" [rounded]="true" [text]="true" (click)="openAssignPermModal(role)"
                title="Add Permission"></p-button>
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (click)="openRenameRoleModal(role)"
                title="Rename Role"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Create Role Modal -->
<p-dialog header="Create Role" [visible]="showAddRoleModal()" (visibleChange)="!$event && closeModals()"
  [modal]="true" [style]="{width: '450px'}" styleClass="glass-dialog">
  <form (ngSubmit)="onCreateRole()" #roleForm="ngForm">
    <div class="form-group p-fluid">
      <label class="form-label">Role Code</label>
      <input pInputText [(ngModel)]="newRoleCode" name="newRoleCode" required placeholder="ROLE_DEVELOPER" />
    </div>
    <div class="form-group p-fluid mt-3">
      <label class="form-label">Role Name</label>
      <input pInputText [(ngModel)]="newRoleName" name="newRoleName" required placeholder="Backend Developer" />
    </div>
    <div class="flex justify-content-end gap-2 mt-4" style="display:flex; justify-content: flex-end; gap: 8px;">
      <p-button label="Cancel" severity="secondary" (click)="closeModals()"></p-button>
      <p-button label="Create" type="submit" [disabled]="roleForm.invalid" styleClass="glow-button"></p-button>
    </div>
  </form>
</p-dialog>

<!-- Assign Permission Modal -->
<p-dialog header="Assign Permission to {{ permRoleTarget()?.roleName }}" [visible]="permRoleTarget() !== null"
  (visibleChange)="!$event && closeModals()" [modal]="true" [style]="{width: '450px'}" styleClass="glass-dialog">
  <form (ngSubmit)="onAssignPermissionSubmit()" #permForm="ngForm">
    <div class="form-group p-fluid">
      <label class="form-label">System Code</label>
      <input pInputText [(ngModel)]="newPermSys" name="newPermSys" required placeholder="DEPT_SERVICE" />
    </div>
    <div class="form-group p-fluid mt-3">
      <label class="form-label">Permission Code</label>
      <input pInputText [(ngModel)]="newPermCode" name="newPermCode" required placeholder="DEPT_WRITE" />
    </div>
    <div class="form-group p-fluid mt-3">
      <label class="form-label">Permission Name</label>
      <input pInputText [(ngModel)]="newPermName" name="newPermName" required
        placeholder="Create and restructure departments" />
    </div>
    <div class="flex justify-content-end gap-2 mt-4" style="display:flex; justify-content: flex-end; gap: 8px;">
      <p-button label="Cancel" severity="secondary" (click)="closeModals()"></p-button>
      <p-button label="Confirm Report" type="submit" [disabled]="permForm.invalid"
        styleClass="glow-button"></p-button>
    </div>
  </form>
</p-dialog>

<!-- Rename Role Modal -->
<p-dialog header="Rename Role - {{ renameRoleTarget()?.roleCode }}" [visible]="renameRoleTarget() !== null"
  (visibleChange)="!$event && closeModals()" [modal]="true" [style]="{width: '450px'}" styleClass="glass-dialog">
  <div class="form-group p-fluid">
    <label class="form-label">New Role Name</label>
    <input pInputText [(ngModel)]="newRoleRename" placeholder="Senior Backend Developer" />
  </div>
  <div class="flex justify-content-end gap-2 mt-4" style="display:flex; justify-content: flex-end; gap: 8px;">
    <p-button label="Cancel" severity="secondary" (click)="closeModals()"></p-button>
    <p-button label="Confirm Rename" (click)="onRenameRoleSubmit()" styleClass="glow-button"></p-button>
  </div>
</p-dialog>
