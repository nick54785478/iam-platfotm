<div class="iam-container">
  <!-- Tabs Selector -->
  <div class="tabs glass-panel" style="justify-content: space-between; align-items: center;">
    <div>
      <button [class.active]="activeTab() === 'users'" (click)="activeTab.set('users')" class="tab-btn">
        👥 User Directory
      </button>
      <button [class.active]="activeTab() === 'roles'" (click)="activeTab.set('roles')" class="tab-btn">
        🔑 Roles & Permissions
      </button>
      <button [class.active]="activeTab() === 'groups'" (click)="activeTab.set('groups')" class="tab-btn">
        🛡️ Permission Groups
      </button>
    </div>
    <a routerLink="/register" class="register-link"
      style="color: var(--primary); text-decoration: none; font-size: 0.95rem; font-weight: 500; margin-right: 1rem; display: flex; align-items: center; gap: 0.5rem; transition: var(--transition-fast);">
      <i class="pi pi-user-plus"></i> Register Tenant Admin
    </a>
  </div>

  <!-- Content sections -->
  <div class="main-layout animate-fade-in">
    <app-iam-users *ngIf="activeTab() === 'users'"></app-iam-users>
    <app-iam-roles *ngIf="activeTab() === 'roles'"></app-iam-roles>
    <app-iam-groups *ngIf="activeTab() === 'groups'"></app-iam-groups>
  </div>
</div>
