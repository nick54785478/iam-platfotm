<div class="dashboard-container">
  <!-- Sidebar Navigation -->
  <aside class="sidebar glass-panel">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-symbol">▲</span>
        <span class="logo-text">IAM Space</span>
      </div>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard/org-tree" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>Organization Tree</span>
      </a>

      <a routerLink="/dashboard/iam" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>IAM Operations</span>
      </a>

      <a routerLink="/dashboard/tenants" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <span>Tenant Central</span>
      </a>

      <a routerLink="/dashboard/dept-permissions" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Dept Permissions</span>
      </a>

      <a routerLink="/dashboard/kyc" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
        <span>My KYC Profile</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile" (click)="openProfileSidebar()" style="cursor: pointer; transition: background 0.2s; border-radius: 8px; padding: 0.25rem;" title="View My Permissions" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
        <div class="avatar">{{ userInitials() }}</div>
        <div class="user-info">
          <div class="username">{{ authService.currentUser() }}</div>
          <div class="tenant">Tenant: {{ authService.currentTenant() }}</div>
        </div>
      </div>
      <button (click)="onLogout()" class="logout-btn" title="Sign Out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logout-icon">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main Layout Body -->
  <main class="main-content animate-fade-in">
    <header class="top-bar glass-panel">
      <h1 class="page-title">{{ activePageTitle() }}</h1>
      <div class="top-actions">
        <div class="status-indicator">
          <span class="pulse-dot"></span>
          Gateway: <span class="gateway-status">Connected</span>
        </div>
      </div>
    </header>
    
    <section class="content-body">
      <router-outlet></router-outlet>
    </section>
  </main>

  <app-user-profile-sidebar 
    [visible]="showProfileSidebar()" 
    (visibleChange)="showProfileSidebar.set($event)"
    [user]="currentUserRepresentation">
  </app-user-profile-sidebar>
</div>
